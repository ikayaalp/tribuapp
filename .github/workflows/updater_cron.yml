name: Daily Data Updater

on:
  schedule:
    # 00:00 UTC = 03:00 TSİ (Türkiye Saati ile her gece 3'te çalışır)
    - cron: '0 0 * * *'
  workflow_dispatch: # GitHub arayüzünden manuel tetiklemeye de izin verir

jobs:
  update-datasets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run Updater Script
        run: |
          cd tribun-main
          python updater.py
        # Burada FastAPI sunucusu olmadığı için hata fırlatabilir ama önemli olan CSV'lerin güncellenmesi.
        # Script CSV'leri kaydedip hata fırlatsa bile işlemin başarılı sayılması için continue-on-error kullanıyoruz (veya script kendisi except bloğunda handle ediyordu zaten)

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tribun-main/datasets/*.csv
          # Eğer değişiklik yoksa hata vermemesi için diff kontrolü yapıyoruz
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update matches data via SportMonks API (Nightly)"
          git push
